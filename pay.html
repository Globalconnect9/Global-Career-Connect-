<!DOCTYPE html>
<html>
<head>
<title>Professional Job Application</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#081b33,#163d70);
min-height:100vh;
color:white;
overflow-x:hidden;
}


.loader{
position:fixed;
height:100%;
width:100%;
background:#061426;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader div{
width:60px;
height:60px;
border:6px solid #00eaff;
border-top-color:transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}


.container{

width:90%;
max-width:700px;
margin:70px auto;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
box-shadow:0 20px 50px #0008;
animation:show .8s;

}

@keyframes show{
from{
opacity:0;
transform:translateY(40px)
}
to{
opacity:1;
}
}


h1{
text-align:center;
margin-bottom:20px;
color:#00f7ff;
}


input,select{

width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:none;
outline:none;
font-size:16px;

}


button{

width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#00eaff;
color:#001;
font-weight:bold;
font-size:18px;
cursor:pointer;
transition:.3s;
margin-top:15px;

}

button:hover{

transform:scale(1.05);
box-shadow:0 0 25px #00eaff;

}


.hidden{
display:none;
}


.qr{

width:220px;
height:220px;
background:white;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-weight:bold;
border-radius:15px;

}


.status{

margin-top:20px;
text-align:center;
font-size:20px;
color:#00ff99;

}


.whatsapp{

background:#25D366;
color:white;

}


.small{

text-align:center;
opacity:.8;
margin-top:15px;

}



@media(max-width:500px){

.container{
padding:20px;
margin:30px auto;
}

h1{
font-size:24px;
}

}

</style>

</head>


<body>


<div class="loader" id="loader">
<div></div>
</div>



<div class="container" id="applyPage">


<h1> Job Application</h1>

<p class="small">
Fill your details carefully to apply
</p>



<form id="jobForm">


<input id="name" placeholder="Your Full Name" required>

<input id="age" type="number" placeholder="Your Age" required>

<input id="address" placeholder="Your Address" required>

<input id="phone" placeholder="Contact Number" required>

<input id="email" type="email" placeholder="Email Address" required>



<select id="cvChoice" onchange="cvOption()" required>

<option value="">
Do you have CV?
</option>

<option value="yes">
Yes, I have CV
</option>

<option value="no">
No, I don't have CV
</option>

</select>



<div id="cvBox" class="hidden">

<label>
Upload Your CV
</label>

<input type="file" accept=".pdf,.doc,.docx">


</div>



<button>
Submit Application
</button>


</form>


</div>





<div class="container hidden" id="payPage">


<h1>Global Career </h1>


<h2 style="text-align:center">
Pay Job Application Charge
</h2>


<h1>
Rs.450/-
</h1>



<div class="qr">

QR CODE IMAGE HERE

</div>


<p class="small">
Scan QR and complete payment
</p>



<label>
Send Paid Screenshot Here
</label>

<input type="file" id="paymentImage">



<button onclick="confirmPay()">

Submit Payment

</button>



<div id="waiting" class="status hidden">

Waiting for confirmation...

</div>




<button 
id="whatsapp"
class="whatsapp hidden"
onclick="openWhatsapp()">

Click here to talk agent for job queries

</button>



</div>





<script>


window.onload=()=>{

setTimeout(()=>{

document.getElementById("loader").style.display="none";

},1000);

}



function cvOption(){


let value=document.getElementById("cvChoice").value;

let box=document.getElementById("cvBox");


if(value==="yes"){

box.classList.remove("hidden");

}

else{

box.classList.add("hidden");

}

}




document.getElementById("jobForm")
.addEventListener("submit",function(e){


e.preventDefault();



let cv=document.getElementById("cvChoice").value;


if(cv===""){

alert("Please select CV option");
return;

}



document.getElementById("applyPage")
.classList.add("hidden");


document.getElementById("payPage")
.classList.remove("hidden");


window.scrollTo(0,0);



});





function confirmPay(){


let file=document.getElementById("paymentImage");


if(file.files.length===0){

alert("Please upload paid screenshot");

return;

}



document.getElementById("waiting")
.classList.remove("hidden");



setTimeout(()=>{


document.getElementById("waiting")
.innerHTML=
"Payment Received ✔<br>Agent will contact you";


document.getElementById("whatsapp")
.classList.remove("hidden");


},2500);



}




function openWhatsapp(){


let msg=
"Namaste sir , I want to apply for job.";


window.location.href=
"https://wa.me/9779805742422?text="
+encodeURIComponent(msg);


}


</script>


</body>
</html>
